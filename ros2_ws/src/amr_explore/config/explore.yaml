explore:
  ros__parameters:
    robot_base_frame: base_link
    costmap_topic: /global_costmap/costmap
    costmap_updates_topic: /global_costmap/costmap_updates
    visualize: true
    # 0.33 Hz (~3s) was re-picking a brand-new frontier on almost every cycle —
    # log showed "Begin navigating ... -> goal A" then "preemption -> goal B"
    # every ~3.0-3.1s, before the robot made real progress toward A. At 0.10 m/s
    # that's <0.3m of travel per cycle. Slowed to 0.1 Hz (~10s) so it commits to
    # a frontier long enough to actually reach it instead of flip-flopping
    # direction (which read as "spinning"/indecisive).
    planner_frequency: 0.1
    progress_timeout: 30.0
    # potential_scale (distance penalty) raised, gain_scale (frontier-size reward)
    # lowered — biases frontier choice toward the NEAREST unexplored edge rather
    # than the largest one, producing room-by-room coverage instead of long
    # diagonal hops to far-away "interesting" areas.
    potential_scale: 6.0
    orientation_scale: 0.0
    gain_scale: 0.5
    min_frontier_size: 0.25
    use_nav2_api: true
    transform_tolerance: 0.3
    # NOTE: explore_lite (m-explore-ros2) has no "spin before first search"
    # option -- there used to be a `start_with_rotations` param here, but it's
    # not declared/read anywhere in explore.cpp (a no-op). The premature
    # "No frontiers found, stopping" this was meant to fix is now handled in
    # amr_home_manager: on EXPLORATION_COMPLETE while still EXPLORING, it sends
    # a real Nav2 Spin action (full 360 deg) to sweep the LiDAR across new area,
    # then re-publishes /explore/resume.
