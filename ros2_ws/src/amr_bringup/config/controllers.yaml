controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    front_left_wheel_command_joint_name:  wheel_FL_joint
    front_right_wheel_command_joint_name: wheel_FR_joint
    rear_left_wheel_command_joint_name:   wheel_RL_joint
    rear_right_wheel_command_joint_name:  wheel_RR_joint
    front_left_wheel_state_joint_name:    wheel_FL_joint
    front_right_wheel_state_joint_name:   wheel_FR_joint
    rear_left_wheel_state_joint_name:     wheel_RL_joint
    rear_right_wheel_state_joint_name:    wheel_RR_joint
    kinematics:
      wheels_radius: 0.030
      # lx + ly: 0.231 (half 46.2cm) + 0.255 (half 51.0cm) = measured 2026-05-31
      sum_of_robot_center_projection_on_X_Y_axis: 0.486
    enable_odom_tf: false       # robot_localization EKF owns odom→base_link TF
    reference_timeout: 0.5
    base_frame_id: base_link
    odom_frame_id: odom
