imu_filter_madgwick:
  ros__parameters:
    use_mag: false           # magnetometer disabled — DC motor current corrupts readings
    publish_tf: false        # EKF owns the odom→base_link TF
    world_frame: "enu"
    gain: 0.1
    # zeta = gyroscope drift-bias gain. Raising this 0.0->0.01 was tried as a fix for
    # the ~0.45 deg/s stationary yaw drift and made NO measurable difference — because
    # zeta can only be informed by the accelerometer's gravity-vector correction, and
    # gravity has no yaw component. In 6-DOF (no magnetometer) mode, Madgwick literally
    # cannot observe or correct yaw-axis gyro bias. The real fix is at the source: a
    # startup gyro calibration in imu_sensor_node.py now measures and subtracts the
    # raw zero-rate offset (raw data confirmed a constant ~0.0077 rad/s on Z — exactly
    # the drift magnitude). Left at 0.0; it's a no-op for the yaw problem either way.
    zeta: 0.0
    orientation_stddev: 0.005
    remove_gravity_vector: false
